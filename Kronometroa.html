<head>

    <title>Erlojua eta kronometroa</title>

<body>
    <h1>Erlojua</h1>
    <div id="erlojua">--:--:--</div>

    <h1>Kronometroa</h1>

    <div class="botoiak">
        <button id="abiarazi">Kontatzen jarraitu</button>
        <button id="gelditu">Kronometro gelditu</button>
        <button id="berrabiarazi">Berrabiarazi</button>
    </div>

    <div class="a">
        <label for="aukeratutako_Denbora">Segundotan balioa ezarri: </label>
        <input type="number" id="aukeratutako_Denbora" min="0" placeholder="0">
    </div>

    <script src="Kronometroa.js"></script>
